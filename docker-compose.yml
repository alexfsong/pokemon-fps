services:
  game:
    build: .
    image: pokemon-fps:latest
    container_name: monfps_game
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=2567
    expose:
      - "2567"
    mem_limit: 1g

  caddy:
    image: caddy:2-alpine
    container_name: monfps_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - game

volumes:
  caddy_data:
  caddy_config:
